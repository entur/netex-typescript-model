name: Generate & Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: html-ts-gen/package-lock.json

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('json-schema/pom.xml') }}
          restore-keys: maven-

      - run: npm ci
        working-directory: html-ts-gen

      - name: Build base assembly
        run: make all ASSEMBLY=base

      - uses: actions/upload-artifact@v4
        with:
          name: assembly-base
          path: generated-src/base/
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: xsd
          path: xsd/
          retention-days: 1

  build-others:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ntt
            args: "ASSEMBLY=network+timetable"
            dir: network+timetable
          - name: full
            args: "ASSEMBLY=network+timetable+fares+new-modes"
            dir: fares+network+new-modes+timetable
          - name: subgraph
            args: "SUB_GRAPH=ResourceFrame COLLAPSE=1"
            dir: "base@ResourceFrame@tiny"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: html-ts-gen/package-lock.json

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('json-schema/pom.xml') }}
          restore-keys: maven-

      - run: npm ci
        working-directory: html-ts-gen

      - name: Build ${{ matrix.name }} assembly
        run: make all ${{ matrix.args }}

      - uses: actions/upload-artifact@v4
        with:
          name: assembly-${{ matrix.name }}
          path: generated-src/${{ matrix.dir }}/
          retention-days: 1

  test:
    needs: build-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: html-ts-gen/package-lock.json

      - run: sudo apt-get install -y libxml2-utils

      - run: npm ci
        working-directory: html-ts-gen

      - uses: actions/download-artifact@v4
        with:
          name: assembly-base
          path: generated-src/base/

      - uses: actions/download-artifact@v4
        with:
          name: xsd
          path: xsd/

      - name: Run tests
        working-directory: html-ts-gen
        run: npx vitest run
        env:
          ROUNDTRIP_EXTENSIVE: "1"

      - name: Run e2e codegen type-check
        working-directory: html-ts-gen
        run: npx tsx scripts/e2e-codegen-typecheck.ts

  assemble:
    needs: [build-base, build-others, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: html-ts-gen/package-lock.json

      - run: npm ci
        working-directory: html-ts-gen

      - uses: actions/download-artifact@v4
        with:
          name: assembly-base
          path: generated-src/base/

      - uses: actions/download-artifact@v4
        with:
          name: assembly-ntt
          path: generated-src/network+timetable/

      - uses: actions/download-artifact@v4
        with:
          name: assembly-full
          path: generated-src/fares+network+new-modes+timetable/

      - uses: actions/download-artifact@v4
        with:
          name: assembly-subgraph
          path: "generated-src/base@ResourceFrame@tiny/"

      - name: Build welcome page
        working-directory: html-ts-gen
        run: npx tsx scripts/build-docs-index.ts

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    needs: assemble
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
